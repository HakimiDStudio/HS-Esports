<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈基米工作室电竞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            /* 渐变背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        /* 标题上下浮动动画 */
        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* 打字机效果容器 */
        .intro {
            width: 100%;
            max-width: 500px;
            font-size: 20px;
            line-height: 2;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #fff;
            animation: typing 3s steps(20), blink 0.6s infinite;
            margin-bottom: 60px;
            text-align: center;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            0%,100% { border-color: #fff; }
            50% { border-color: transparent; }
        }

        /* 支付按钮容器 */
        .pay-box {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pay-btn {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }

        .wechat {
            background-color: #07c160;
        }
        .alipay {
            background-color: #1677ff;
        }
        .qq {
            background-color: #12b7f5;
        }

        .pay-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <!-- 标题 -->
    <h1 class="title">哈基米工作室电竞</h1>

    <!-- 打字机介绍 -->
    <div class="intro">
        专业三角洲行动护航，稳定高效。
    </div>

    <!-- 三个支付选项 -->
    <div class="pay-box">
        <a href="/pay/wechat.html" class="pay-btn wechat">微信支付</a>
        <a href="/pay/alipay.html" class="pay-btn alipay">支付宝支付</a>
        <a href="/pay/qq.html" class="pay-btn qq">QQ支付</a>
    </div>
</body>
</html>
